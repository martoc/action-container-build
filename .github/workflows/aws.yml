---
name: AWS Container Build

on:
  workflow_call:
    inputs:
      region:
        description: "AWS region for ECR (e.g., us-east-2, eu-west-1)"
        required: true
        type: string
      repository_name:
        description: "ECR repository name"
        required: true
        type: string
      aws_account_id:
        description: "AWS Account ID (12-digit)"
        required: true
        type: string
      platforms:
        description: "Platforms to build for"
        required: false
        type: string
        default: "linux/arm64,linux/amd64"
      build_args:
        description: "Additional build arguments to pass to docker build"
        required: false
        type: string
        default: ""
      runner:
        description: "GitHub Actions runner to use"
        required: false
        type: string
        default: "ubuntu-24.04"
    secrets:
      aws_role_to_assume:
        description: "ARN of the AWS IAM role to assume via OIDC"
        required: true

jobs:
  build:
    permissions:
      contents: write
      id-token: write
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50
          fetch-tags: true
      - name: Tag
        uses: martoc/action-tag@v0
        with:
          skip-push: true
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_to_assume }}
          role-session-name: github-actions
          aws-region: ${{ inputs.region }}
      - name: Build & Push Container Image
        uses: martoc/action-container-build@v0
        with:
          registry: aws
          region: ${{ inputs.region }}
          repository_name: ${{ inputs.repository_name }}
          aws_account_id: ${{ inputs.aws_account_id }}
          platforms: ${{ inputs.platforms }}
          build_args: ${{ inputs.build_args }}
